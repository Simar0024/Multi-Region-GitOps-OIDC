name: 'Infrastructure Drift Detection'

on:
  schedule:
    - cron: '0 0 * * *' # Every night at midnight
  workflow_dispatch: # Allow manual trigger

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Plan (Detailed Exit Code)
        id: plan
        run: |
          terraform init
          # -detailed-exitcode returns 2 if there is drift
          terraform plan -detailed-exitcode || echo "drift_detected=$?" >> $GITHUB_OUTPUT
        working-directory: ./terraform

      - name: Create Issue if Drift Found
        if: steps.plan.outputs.drift_detected == '2'
        run: |
          gh issue create \
            --title "⚠️ Infrastructure Drift Detected" \
            --body "Terraform has detected changes between the code and Azure. Please review the nightly plan."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}