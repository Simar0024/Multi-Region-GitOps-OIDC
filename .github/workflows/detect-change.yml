name: 'Infrastructure Drift Detection'

on:
  schedule:
    - cron: '0 0 * * *' 
  workflow_dispatch: 

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      id-token: write
      contents: read
    
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      # --- MISSING STEP ADDED HERE ---
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Plan (Detailed Exit Code)
        id: plan
        working-directory: ./terraform
        run: |
          terraform init
          # We use + set +e so the shell doesn't exit immediately on code 2
          set +e
          terraform plan -detailed-exitcode
          EXIT_CODE=$?
          echo "drift_status=$EXIT_CODE" >> $GITHUB_OUTPUT
          
          # If it's code 1, something actually crashed (not drift)
          if [ $EXIT_CODE -eq 1 ]; then exit 1; fi

      - name: Create Issue if Drift Found
        # Code 2 means "Succeeded with non-empty diff" (Drift!)
        if: steps.plan.outputs.drift_status == '2'
        run: |
          gh issue create \
            --title "⚠️ Infrastructure Drift Detected" \
            --body "Terraform has detected changes between the code and Azure. Please review the nightly plan."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}